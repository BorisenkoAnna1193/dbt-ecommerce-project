version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"

  metabase:
    image: metabase/metabase
    container_name: metabase
    ports:
      - "3000:3000"
    depends_on:
      - clickhouse

  dbt:
    build: .
    container_name: dbt
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - clickhouse